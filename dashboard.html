<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم - مهنتي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="pages.css" />
  <style>
    body { background: var(--gray-50); }
    .dash-shell { min-height: 100vh; }
    .dash-main { max-width: 1180px; margin: 0 auto; padding: 104px 16px 32px; }
    .dash-header {
      display: flex; justify-content: space-between; gap: 16px; align-items: center;
      margin-bottom: 24px;
    }
    .dash-title h1 { color: var(--navy); font-size: 1.7rem; margin-bottom: 4px; }
    .dash-title p { color: var(--gray-500); font-size: 0.95rem; }
    .dash-grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
    .panel {
      background: var(--white); border: 1px solid var(--gray-100);
      border-radius: var(--radius-lg); padding: 22px;
    }
    .panel h2, .panel h3 { color: var(--navy); margin-bottom: 14px; }
    .profile-line { display: flex; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--gray-100); }
    .profile-line:last-child { border-bottom: 0; }
    .profile-line span:first-child { color: var(--gray-500); }
    .profile-line span:last-child { color: var(--navy); font-weight: 700; text-align: left; }
    .badge {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 999px; padding: 5px 10px; font-size: 0.78rem; font-weight: 800;
      background: var(--gray-100); color: var(--gray-600);
    }
    .badge.approved { background: rgba(34,197,94,0.12); color: #15803d; }
    .badge.pending { background: rgba(245,158,11,0.14); color: #a16207; }
    .badge.rejected { background: rgba(239,68,68,0.12); color: #b91c1c; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .tab-btn {
      border: 1px solid var(--gray-200); background: var(--white); color: var(--gray-600);
      border-radius: var(--radius-md); padding: 9px 14px; cursor: pointer;
      font-family: var(--font-primary); font-weight: 700;
    }
    .tab-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(249,115,22,0.08); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .form-grid label { display: block; color: var(--gray-600); font-size: 0.85rem; font-weight: 700; margin-bottom: 6px; }
    .form-grid input, .form-grid select, .form-grid textarea, .search-row input {
      width: 100%; border: 1px solid var(--gray-200); border-radius: var(--radius-md);
      padding: 11px 12px; font-family: var(--font-primary); background: var(--white);
    }
    .form-grid textarea { min-height: 96px; resize: vertical; }
    .form-wide { grid-column: 1 / -1; }
    .list { display: grid; gap: 12px; margin-top: 14px; }
    .item {
      border: 1px solid var(--gray-100); border-radius: var(--radius-md);
      padding: 14px; background: #fff;
    }
    .item-head { display: flex; justify-content: space-between; gap: 12px; align-items: start; margin-bottom: 8px; }
    .item-title { color: var(--navy); font-weight: 800; }
    .item-meta { color: var(--gray-500); font-size: 0.85rem; line-height: 1.7; }
    .item-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .search-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .empty { color: var(--gray-500); padding: 14px 0; }
    .notice {
      border: 1px solid rgba(245,158,11,0.3); background: rgba(245,158,11,0.1);
      color: #92400e; border-radius: var(--radius-md); padding: 12px; margin-bottom: 16px;
    }
    @media (max-width: 860px) {
      .dash-grid, .form-grid { grid-template-columns: 1fr; }
      .dash-header, .search-row { flex-direction: column; align-items: stretch; }
      .dash-main { padding-top: 88px; }
    }
  </style>
</head>
<body>
  <div class="dash-shell">
    <nav class="navbar scrolled">
      <div class="nav-container">
        <a href="index.html" class="nav-logo">
          <img src="assets/logo.png" alt="SkillUp" class="logo-img" />
        </a>
        <div class="nav-actions" id="nav-actions"></div>
      </div>
    </nav>

    <main class="dash-main">
      <div class="dash-header">
        <div class="dash-title">
          <h1 id="page-title">لوحة التحكم</h1>
          <p id="page-subtitle">إدارة الحساب والتدريب من مكان واحد.</p>
        </div>
        <a class="btn btn-primary" href="opportunities.html" id="browse-link">استكشاف الفرص</a>
      </div>

      <div id="auth-message" class="panel" style="display:none;"></div>

      <div id="dashboard-content" class="dash-grid" style="display:none;">
        <aside class="panel">
          <h2>حسابي</h2>
          <div id="user-info"></div>
        </aside>

        <section class="panel">
          <div class="tabs" id="tabs"></div>

          <div id="admin-panel" class="tab-panel">
            <h3>مراجعة الحسابات الجديدة</h3>
            <div id="pending-users" class="list"></div>
          </div>

          <div id="trainer-panel" class="tab-panel">
            <h3>ملف الحرفي</h3>
            <div id="trainer-profile"></div>
            <form id="trainer-form" class="form-grid" style="margin-top:16px;">
              <div>
                <label for="skill-select">المهارة</label>
                <select id="skill-select"></select>
              </div>
              <div>
                <label for="trainer-city">الولاية / المدينة</label>
                <input id="trainer-city" />
              </div>
              <div>
                <label for="trainer-exp">سنوات الخبرة</label>
                <input id="trainer-exp" type="number" min="0" />
              </div>
              <div class="form-wide">
                <label for="trainer-bio">نبذة عنك</label>
                <textarea id="trainer-bio"></textarea>
              </div>
              <div class="form-wide">
                <button class="btn btn-primary" type="submit">حفظ الملف</button>
              </div>
            </form>
            <h3 style="margin-top:24px;">طلبات التدريب الواردة</h3>
            <div id="requests-list" class="list"></div>
          </div>

          <div id="trainee-panel" class="tab-panel">
            <h3>البحث عن حرفيين</h3>
            <div class="search-row">
              <input id="search-trainer" placeholder="ابحث باسم الحرفي أو الولاية" />
              <button class="btn btn-primary" id="btn-search-trainers">بحث</button>
            </div>
            <div id="trainers-list" class="list"></div>
            <h3 style="margin-top:24px;">طلباتي</h3>
            <div id="my-requests" class="list"></div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
  <script type="module" src="dashboard.js"></script>
</body>
</html>
